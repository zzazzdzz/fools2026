<!DOCTYPE html>
<meta charset='utf-8'>
<title>TheZZAZZGlitch's April Fools Event 2026</title>
<script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
<script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/js/bootstrap.min.js" integrity="sha384-Tc5IQib027qvyjSMfHjOMaLkfuWVxZxUPnCJA7l2mCWNIpG9mGCD8wGNIcPD7Txa" crossorigin="anonymous"></script>

<script src='script.js'></script>
<link rel='stylesheet' href='style.css'>

<script>
$(document).ready(function(){
    updateTimers();
    setInterval(updateTimers, 1000);
    if (localStorage['userToken']) {
        $("#usr").html("You are currently logged in as <b>" + entities(localStorage.userName) + "</b>.<br>Not you? <a href='account.html'>Go to account management</a>");
    }
});

function submitCode() {
    $('#btn_c')[0].disabled = true;
    apiHit({
        "r": "submit",
        "token": localStorage.userToken,
        "code": $("#code").val()
    }, function(r) {
        if (r['error']) {
            $('#btn_c')[0].disabled = false;
            alert(r['msg']);
            return;
        }
        $("#box_submit").css("display", "none");
		var summary = "<p>Highest floor this run: <b>" + r['data']['pwStruct']['floor'] + "F</b><br>";
		summary += "Highest floor overall: <b>" + r['data']['highestFloor'] + "F</b><br>";
        if (r['data']['pwStruct']['floor'] == 0) {
            summary += "Congratulations, you completed the challenge!";
        } else {
            summary += "Started from checkpoint: <b>" + (r['data']['pwStruct']['checkpoint'] > 0 ? "Yes" : "No") + "</b>";
        }
		if (r['data']['pwStruct']['checkpoint'] == 0 && !r['data']['pwStruct']['warped']) {
			summary += "<br>Eligible for Zzazzity Forest";
		}
		summary += "</p>";
		summary += "<p>" + getAchiStr(r['data']) + "</p>";
		summary += "<div style='margin:15px'><button class='btn' onclick='window.location=\"index.html\"' id='btn_c'>Back to leaderboard</button></div>";
        $("#confirm_text").html(summary);
        $("#confirm_box").fadeIn(1000);
		setTimeout(updateAchievementTooltips, 1000);
    }, function() {
        $('#btn_c')[0].disabled = false;
        alert("Couldn't connect to the server. Try again later.");
    });
}
</script>

<div id='content'>
    <div class="box centered">
        <h1><a href='/fools2026/' class='headerlink'>TheZZAZZGlitch's April Fools Event 2026</a></h1>
        <p id='countdown'>-</p>
    </div>
    
    <div class="box centered" id="box_submit">
        <h1>Submit a completion code</h1>
        <p id='usr'><b>You are not logged in</b>. Your progress will not be saved on the leaderboard.<br>
        Please <a href='account.html'>log in or register</a> first if you want to make your score visible.</p>
        <div style='margin:15px'>
            <input type='text' class='inp' id='code' autocomplete='off' style='width: 250px'>
            <button class='btn' onclick='submitCode()' id='btn_c'>Submit code</button>
        </div>
        <p><a href='index.html'>Go back to the leaderboard</a></p>
    </div>
    
    <div class="box centered" id="confirm_box" style='display:none'>
        <h1>Successful submission</h1>
        <div id='confirm_text'><p>bepis</p></div>
    </div>
</div>
